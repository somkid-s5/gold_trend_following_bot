# =============================================================================
# GOLD TREND FOLLOWING BOT - INSTITUTIONAL CONFIGURATION
# =============================================================================

# MetaTrader 5 Connection Settings
mt5:
  login: 433209659
  password: "CHANGE_ME_IN_ENV" # Use .env for security
  server: "Exness-MT5Trial7"
  path: "C:\\Program Files\\MetaTrader 5 EXNESS\\terminal64.exe"
  timeout: 60000
  order_retries: 3
  retry_delay_ms: 1000
  magic_number: 260324
  deviation: 20

# Trading Universe & Parameters
trading:
  symbol: "XAUUSDm"
  poll_seconds: 60
  reconnect_seconds: 15
  history_bars:
    trend_following: 1500 # Bars needed for D1 EMA simulation

# Risk Management Logic (Dynamic & Adaptive)
risk:
  risk_per_trade_pct: 2.5      # Base risk when confidence is 1.0
  max_daily_loss_pct: 10.0     # Stop trading for the day if lost this much
  max_total_drawdown_pct: 95.0 # Global Circuit Breaker (stops bot)
  max_spread_points: 500       # Maximum allowed spread for XAUUSD
  close_all_on_daily_limit: false
  allow_live_trading: true
  allow_strategy_addons:
    trend_following: 1         # Maximum concurrent positions per strategy
  breakeven_rr_trigger: 1.0    # Move SL to entry after RR 1.0
  trailing_stop_atr_multiple: 1.5

# Strategy Specific Parameters
strategies:
  trend_following:
    timeframe: "H1"
    fast_ema: 34
    slow_ema: 150
    rsi_period: 14
    rsi_buy_level: 35
    rsi_sell_level: 65
    atr_period: 14
    atr_sl_multiplier: 2.0
    take_profit_rr: 5.0

# Backtest Environment
backtest:
  initial_balance: 10000.0
  fee_per_lot: 0.0 # Commission per round turn
  start_date: "2016-01-01"

# Symbol Definitions (Crucial for calculations)
symbols:
  XAUUSDm:
    point: 0.01
    contract_size: 100
    min_lot: 0.01
    max_lot: 20.0
    lot_step: 0.01

# Economic News Filter
news_filter:
  enabled: true
  minutes_before: 45
  minutes_after: 30
  high_impact_events: [] # Will be populated by calendar

# External Integrations
notifications:
  telegram:
    enabled: true
    summary_time_utc: "21:00"
    state_path: "reports/telegram_state.json"
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"
    send_guard_alerts: true
    send_startup_alerts: true
    send_shutdown_alerts: true
